name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0, 1.0.0, patch, minor, major)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (do not publish)'
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"

          # Get current version from core package
          CURRENT_VERSION=$(jq -r '.version' packages/base/package.json)

          # Parse current version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "$INPUT_VERSION" in
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            *)
              # Assume it's a specific version
              NEW_VERSION="$INPUT_VERSION"
              ;;
          esac

          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping version from $CURRENT_VERSION to $NEW_VERSION"

      - name: Update package versions
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"

          # Helper: update .version and resolve all workspace:* deps to the new version
          update_pkg() {
            local file="$1"
            jq --arg v "$NEW_VERSION" '
              .version = $v |
              if .dependencies then
                .dependencies |= with_entries(
                  if .value == "workspace:*" then .value = $v else . end
                )
              else . end
            ' "$file" > tmp.json && mv tmp.json "$file"
            echo "Updated $file to $NEW_VERSION"
          }

          # Update core and bundle packages
          for pkg in packages/base packages/elements; do
            update_pkg "$pkg/package.json"
          done

          # Update all element packages
          for pkg in elements/*; do
            if [ -f "$pkg/package.json" ]; then
              update_pkg "$pkg/package.json"
            fi
          done

          # Update all CSS art packages
          for pkg in art-elements/*; do
            if [ -f "$pkg/package.json" ]; then
              update_pkg "$pkg/package.json"
            fi
          done

          # Update CSS arts bundle
          update_pkg packages/art-elements/package.json

      - name: Build all packages
        run: bun run build:all

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc

      - name: Publish packages (dry-run)
        if: ${{ inputs.dry-run }}
        run: bun run release:dry-run

      - name: Publish packages
        if: ${{ !inputs.dry-run }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"

          # Publish core first (other packages depend on it)
          echo "Publishing @duskmoon-dev/el-base..."
          cd packages/base
          if npm view @duskmoon-dev/el-base@$NEW_VERSION version >/dev/null 2>&1; then
            echo "  @duskmoon-dev/el-base@$NEW_VERSION already published, skipping"
          else
            bun publish --access public
          fi
          cd ../..

          # Publish all element packages
          for pkg in elements/*; do
            if [ -f "$pkg/package.json" ]; then
              FULL_PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              echo "Publishing $FULL_PKG_NAME..."
              cd "$pkg"
              if npm view $FULL_PKG_NAME@$NEW_VERSION version >/dev/null 2>&1; then
                echo "  $FULL_PKG_NAME@$NEW_VERSION already published, skipping"
              else
                bun publish --access public
              fi
              cd ../..
            fi
          done

          # Publish all CSS art packages
          for pkg in art-elements/*; do
            if [ -f "$pkg/package.json" ]; then
              FULL_PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              echo "Publishing $FULL_PKG_NAME..."
              cd "$pkg"
              if npm view $FULL_PKG_NAME@$NEW_VERSION version >/dev/null 2>&1; then
                echo "  $FULL_PKG_NAME@$NEW_VERSION already published, skipping"
              else
                bun publish --access public
              fi
              cd ../..
            fi
          done

          # Publish bundle packages last (depend on all elements/arts)
          echo "Publishing @duskmoon-dev/elements..."
          cd packages/elements
          if npm view @duskmoon-dev/elements@$NEW_VERSION version >/dev/null 2>&1; then
            echo "  @duskmoon-dev/elements@$NEW_VERSION already published, skipping"
          else
            bun publish --access public
          fi
          cd ../..

          echo "Publishing @duskmoon-dev/art-elements..."
          cd packages/art-elements
          if npm view @duskmoon-dev/art-elements@$NEW_VERSION version >/dev/null 2>&1; then
            echo "  @duskmoon-dev/art-elements@$NEW_VERSION already published, skipping"
          else
            bun publish --access public
          fi
          cd ../..

          echo "All packages published!"

      - name: Commit version bump
        if: ${{ !inputs.dry-run }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new }}"
          git add -A

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit (version already at $NEW_VERSION)"
          else
            git commit -m "chore(release): v$NEW_VERSION"
          fi

          # Only create tag if it doesn't exist
          if git rev-parse "v$NEW_VERSION" >/dev/null 2>&1; then
            echo "Tag v$NEW_VERSION already exists, skipping"
          else
            git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION"
          fi

          git push origin main --follow-tags || true

      - name: Generate package list
        id: packages
        run: |
          # Build element packages list for release notes
          ELEMENTS=""
          for pkg in elements/*; do
            if [ -f "$pkg/package.json" ]; then
              FULL_PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              ELEMENTS="$ELEMENTS- $FULL_PKG_NAME\n"
            fi
          done
          echo "elements<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ELEMENTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Build CSS art packages list for release notes
          CSS_ARTS=""
          for pkg in art-elements/*; do
            if [ -f "$pkg/package.json" ]; then
              FULL_PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              CSS_ARTS="$CSS_ARTS- $FULL_PKG_NAME\n"
            fi
          done
          echo "css_arts<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CSS_ARTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: ${{ !inputs.dry-run }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: v${{ steps.version.outputs.new }}
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Published Packages

            **Core:**
            - @duskmoon-dev/el-base - Base element class with reactive properties, Shadow DOM, and theming utilities

            **Elements:**
            ${{ steps.packages.outputs.elements }}
            **Bundles:**
            - @duskmoon-dev/elements - All DuskMoon elements in one bundle with auto-registration support
            - @duskmoon-dev/art-elements - All CSS art elements in one bundle

            **CSS Art Elements:**
            ${{ steps.packages.outputs.css_arts }}
            ## Installation

            ```bash
            # Install the elements bundle
            bun add @duskmoon-dev/elements

            # Install the CSS art bundle
            bun add @duskmoon-dev/art-elements

            # Or install individual packages
            bun add @duskmoon-dev/el-button
            bun add @duskmoon-dev/el-art-moon
            ```

            ## What's Changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: v${{ steps.version.outputs.new }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run**: ${{ inputs.dry-run }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Core:**" >> $GITHUB_STEP_SUMMARY
          echo "- @duskmoon-dev/el-base" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Elements:**" >> $GITHUB_STEP_SUMMARY
          for pkg in elements/*; do
            if [ -f "$pkg/package.json" ]; then
              FULL_PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              echo "- $FULL_PKG_NAME" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CSS Art Elements:**" >> $GITHUB_STEP_SUMMARY
          for pkg in art-elements/*; do
            if [ -f "$pkg/package.json" ]; then
              FULL_PKG_NAME=$(jq -r '.name' "$pkg/package.json")
              echo "- $FULL_PKG_NAME" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bundles:**" >> $GITHUB_STEP_SUMMARY
          echo "- @duskmoon-dev/elements" >> $GITHUB_STEP_SUMMARY
          echo "- @duskmoon-dev/art-elements" >> $GITHUB_STEP_SUMMARY
